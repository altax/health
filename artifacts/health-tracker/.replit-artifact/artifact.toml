kind = "web"
previewPath = "/"
title = "Personal Health System"
version = "1.0.0"
id = "artifacts/health-tracker"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24166

[services.development]
run = "pnpm --filter @workspace/health-tracker run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/health-tracker", "run", "build" ]
publicDir = "artifacts/health-tracker/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24166"
BASE_PATH = "/"
